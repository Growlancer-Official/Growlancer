version: '3.8'

services:
  # ============================================================
  # PRODUCTION — serves built static assets via Node.js SPA server
  # ============================================================
  web:
    build: .
    ports:
      - '4173:4173'
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    # No volumes in production: the Dockerfile multi-stage build includes all assets
    # volumes:
    #   - ./node_modules:/app/node_modules
    #   - .:/app

volumes:
  supabase-data:
