# Nginx configuration for Growlancer SPA
# This file can be used to serve the built application with proper SPA routing

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
  gzip_vary on;
  gzip_min_length 1000;

  # Root directory for static files
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Cache busting for static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA routing fallback
  # All requests not matching a physical file/directory are served index.html
  location / {
    try_files $uri $uri/ /index.html;

    # Don't cache index.html itself
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Health check endpoint (optional)
  location /_health {
    access_log off;
    return 200 "ok";
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
  }
}
